version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ginas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ginas_tennis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ginas-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ginas-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app  # Hot reload in dev
    depends_on:
      - postgres
    networks:
      - ginas-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ginas-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ginas-network

networks:
  ginas-network:
    name: ginas-network

volumes:
  postgres_data: