services:
  - type: web
    name: ginas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL_OVERRIDE
        sync: false
      - key: DB_ENGINE
        value: postgresql
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://ginas-tennis-world-eta.vercel.app"]'
      - key: FRONTEND_URL
        value: https://ginas-tennis-world-eta.vercel.app